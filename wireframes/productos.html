<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Wireframe - Productos</title>
    <style>body{font-family:sans-serif;background:#eef2ff;color:#111;margin:0;padding:2rem;} .panel{max-width:900px;margin:0 auto;background:#fff;border-radius:18px;padding:2rem;box-shadow:0 24px 60px rgba(15,23,42,.12);} h1{margin-top:0;} .box{border:2px dashed #c7d2fe;border-radius:16px;padding:1.2rem;margin:1rem 0;} ul{padding-left:1.2rem;}</style>
</head>
<body>
<div class="panel">
    <h1>Wireframe: Módulo de Productos</h1>
    <div class="box">
        <strong>Listado de productos</strong>
        <ul>
            <li>Tabla con Producto, Precio, Stock, Categoría y acciones.</li>
            <li>Filtro por categoría y búsqueda por nombre.</li>
        </ul>
    </div>
    <div class="box">
        <strong>Formulario de producto</strong>
        <ul>
            <li>Nombre, precio, stock, categoría.</li>
            <li>Botón guardar y volver.</li>
        </ul>
    </div>
</div>
</body>
</html>
