<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Wireframe - Login</title>
    <style>body{font-family:sans-serif;background:#f5f7fb;color:#111;margin:0;padding:2rem;} .panel{max-width:700px;margin:0 auto;background:#fff;border-radius:16px;padding:2rem;box-shadow:0 20px 50px rgba(0,0,0,.08);} h1{margin-top:0;} .box{border:2px dashed #94a3b8;border-radius:16px;padding:1.2rem;margin:1rem 0;color:#475569;}</style>
</head>
<body>
<div class="panel">
    <h1>Wireframe: Login / Autenticación</h1>
    <div class="box">
        <strong>Componentes:</strong>
        <ul>
            <li>Logo y marca</li>
            <li>Formulario de correo y contraseña</li>
            <li>Validación de campos</li>
            <li>Botón de ingreso y enlace a registro</li>
        </ul>
    </div>
    <div class="box">Flujo mínimo: usuario ingresa correo + contraseña → validación → acceso a Dashboard.</div>
</div>
</body>
</html>
