<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Wireframe - Dashboard</title>
    <style>body{font-family:sans-serif;background:#eef2ff;color:#111;margin:0;padding:2rem;} .panel{max-width:900px;margin:0 auto;background:#fff;border-radius:18px;padding:2rem;box-shadow:0 24px 60px rgba(15,23,42,.12);} h1{margin-top:0;} .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:1rem;} .card{border:2px dashed #c7d2fe;border-radius:16px;padding:1.2rem;background:#f8fafc;} ul{padding-left:1.2rem;} @media(max-width:720px){.grid{grid-template-columns:1fr;}}</style>
</head>
<body>
<div class="panel">
    <h1>Wireframe: Dashboard principal</h1>
    <p>Panel de control con acceso directo a Clientes, Productos, Ventas y reportes.</p>
    <div class="grid">
        <div class="card"><strong>Resumen general</strong><br>Clientes, productos, ventas totales.</div>
        <div class="card"><strong>Acciones rápidas</strong><br>Registrar venta, nuevo cliente, nuevo producto.</div>
        <div class="card"><strong>Enlaces</strong><br>Clientes / Productos / Ventas / Usuarios.</div>
    </div>
</div>
</body>
</html>
