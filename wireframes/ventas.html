<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Wireframe - Ventas</title>
    <style>body{font-family:sans-serif;background:#f3f4f6;color:#111;margin:0;padding:2rem;} .panel{max-width:900px;margin:0 auto;background:#fff;border-radius:18px;padding:2rem;box-shadow:0 24px 60px rgba(15,23,42,.12);} h1{margin-top:0;} .box{border:2px dashed #cbd5e1;border-radius:16px;padding:1.2rem;margin:1rem 0;} ul{padding-left:1.2rem;}</style>
</head>
<body>
<div class="panel">
    <h1>Wireframe: Módulo de Ventas</h1>
    <div class="box">
        <strong>Registro de venta</strong>
        <ul>
            <li>Selección de cliente.</li>
            <li>Selección de producto con stock disponible.</li>
            <li>Ingreso de cantidad y cálculo total.</li>
        </ul>
    </div>
    <div class="box">
        <strong>Detalle de venta</strong>
        <ul>
            <li>Resumen del cliente y los productos vendidos.</li>
            <li>Listado histórico de ventas con total y fecha.</li>
        </ul>
    </div>
</div>
</body>
</html>
